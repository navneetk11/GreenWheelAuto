<!DOCTYPE html>
<html>
<head>
    <title>GreenWheel Auto - Sign In</title>
</head>
<body>
    <h1>GreenWheel Auto — Sign In</h1>
    <hr>

    Email:    <input type="email" id="email" placeholder="jane@example.com"/><br><br>
    Password: <input type="password" id="password"/><br><br>

    <button onclick="loginUser()">Login</button>
    <p id="message"></p>

    <hr>
    <p>Don't have an account? <a href="register.html">Register here</a></p>

    <script>
        const API = 'http://localhost:5000/api/auth';

        async function loginUser() {
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');

            if (!email || !password) {
                messageEl.textContent = 'Please enter both email and password.';
                return;
            }

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Store the token so other pages (cart, etc.) can use it
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Success -> redirect to Catalogue page
                    window.location.href = 'catalogue.html';
                } else {
                    // Error -> show message
                    messageEl.textContent = 'Invalid email or password';
                }
            } catch (err) {
                messageEl.textContent = 'Error connecting to server.';
            }
        }
    </script>
</body>
</html>
