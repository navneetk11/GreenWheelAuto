<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GreenWheel Auto - Checkout</title>
</head>
<body>

    <h1>Checkout</h1>

    <p>Please review your information below to complete your purchase.</p>

    <!-- Temporary token box until the login module is integrated -->
    <div id="devTokenBox">
        <p>You are not logged in.</p>
        <p>For testing, paste a valid JWT token below.</p>

        <input
            type="text"
            id="devTokenInput"
            placeholder="Paste JWT token here"
            size="60"
        >

        <button onclick="saveDevToken()">Save Token</button>
    </div>

    <h2>Shipping Information</h2>

    <form id="checkoutForm">

        <label>Street Address</label><br>
        <input type="text" id="street" required><br><br>

        <label>City</label><br>
        <input type="text" id="city" required><br><br>

        <label>Province</label><br>
        <input type="text" id="province" required><br><br>

        <label>Postal Code</label><br>
        <input type="text" id="zip" required><br><br>

        <h2>Payment Information</h2>

        <label>Card Number</label><br>
        <input type="text" id="cardNumber" required><br><br>

        <label>Expiry Date (MM/YY)</label><br>
        <input type="text" id="expiry" placeholder="MM/YY" required><br><br>

        <label>CVV</label><br>
        <input type="text" id="cvv" required><br><br>

        <button type="submit">Place Order</button>

    </form>

    <p id="resultMessage"></p>

    <script>

        function getToken() {
            return localStorage.getItem('token');
        }

        function saveDevToken() {
            const val = document.getElementById('devTokenInput').value.trim();

            if (val) {
                localStorage.setItem('token', val);
                document.getElementById('devTokenBox').style.display = 'none';
            }
        }

        if (getToken()) {
            document.getElementById('devTokenBox').style.display = 'none';
        }

        document.getElementById('checkoutForm').addEventListener('submit', async function (e) {

            e.preventDefault();

            const token = getToken();

            if (!token) {
                document.getElementById('resultMessage').textContent =
                    'Please log in before checking out.';
                document.getElementById('devTokenBox').style.display = 'block';
                return;
            }

            // Shipping information will be used once the address module
            // is integrated with the backend.
            const body = {
                street: document.getElementById('street').value,
                city: document.getElementById('city').value,
                province: document.getElementById('province').value,
                zip: document.getElementById('zip').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiry: document.getElementById('expiry').value,
                cvv: document.getElementById('cvv').value
            };

            try {

                const res = await fetch('/api/cart/checkout', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('resultMessage').textContent =
                        data.error || 'Checkout could not be completed.';
                    return;
                }

                document.getElementById('resultMessage').textContent =
                    data.message;

                // Hide the form after a successful checkout
                document.getElementById('checkoutForm').style.display = 'none';

            } catch (err) {

                console.log(err);

                document.getElementById('resultMessage').textContent =
                    'Something went wrong while processing your order. Please try again.';
            }

        });

    </script>

</body>
</html>
